<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="#618764"/>

  <!-- Subtle inner highlight -->
  <rect x="1" y="1" width="30" height="30" rx="7.2"
        fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- "TS" monogram -->
  <text x="16" y="22"
        font-family="Georgia, 'Palatino Linotype', serif"
        font-size="15"
        font-style="italic"
        font-weight="700"
        fill="#FFFCF0"
        text-anchor="middle"
        letter-spacing="0.5">TS</text>
</svg>
